steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/pulmonary-ai:latest", "."]

  # Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/pulmonary-ai:latest"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "pulmonary-ai"
      - "--image"
      - "gcr.io/$PROJECT_ID/pulmonary-ai:latest"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--max-instances"
      - "10"
      - "--port"
      - "8080"
      - "--set-env-vars"
      - "DEBUG=False,ALLOWED_HOSTS=*"

images:
  - "gcr.io/$PROJECT_ID/pulmonary-ai:latest"

timeout: "1200s"
