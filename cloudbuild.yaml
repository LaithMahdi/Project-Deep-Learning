steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_IMAGE}", "."]

  # Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_IMAGE}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - DEBUG=False,ALLOWED_HOSTS=*,SERVE_MEDIA=True,SECRET_KEY=${_SECRET_KEY}
      - --memory
      - 2Gi
      - --cpu
      - "1"
      - --timeout
      - "300"

substitutions:
  _SERVICE: pulmonary-ai
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/pulmonary-ai:latest
  _SECRET_KEY: change-this-secret-in-build-command

images:
  - ${_IMAGE}
