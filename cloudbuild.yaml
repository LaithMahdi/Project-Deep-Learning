steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - DEBUG=False,ALLOWED_HOSTS=*,SECRET_KEY=${_SECRET_KEY}

substitutions:
  _SERVICE: pulmonary-ai
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/pulmonary-ai:latest
  _SECRET_KEY: change-this-secret-in-build-command

images:
  - ${_IMAGE}
