{% extends 'base.html' %} {% block content %}
<section class="glass rounded-3xl p-6">
  <h1 class="mb-2 text-2xl font-bold text-slate-900">Test API (legacy)</h1>
  <p class="mb-5 text-sm text-slate-600">
    Cette page conserve le test historique de l'API pour retrocompatibilite.
  </p>

  <div class="grid gap-4 md:grid-cols-2">
    <div class="rounded-2xl border border-slate-200 bg-white p-4">
      <h2 class="text-sm font-semibold text-slate-800">Statut</h2>
      <button
        onclick="testStatus()"
        class="mt-3 rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white"
      >
        Tester
      </button>
      <pre
        id="statusResult"
        class="mt-3 overflow-x-auto rounded-xl bg-slate-900 p-3 text-xs text-slate-100"
      ></pre>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-4">
      <h2 class="text-sm font-semibold text-slate-800">Prediction</h2>
      <input
        type="file"
        id="imageInput"
        accept="image/*"
        class="mt-3 w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
      />
      <button
        onclick="testPrediction()"
        class="mt-3 rounded-xl bg-gradient-to-r from-teal-600 to-sky-600 px-4 py-2 text-sm font-semibold text-white"
      >
        Predire
      </button>
      <pre
        id="predictResult"
        class="mt-3 overflow-x-auto rounded-xl bg-slate-900 p-3 text-xs text-slate-100"
      ></pre>
    </div>
  </div>
</section>

<script>
  async function testStatus() {
    const result = document.getElementById("statusResult");
    result.textContent = "Chargement...";
    try {
      const response = await fetch("/diagnosis/api/model-info/");
      const data = await response.json();
      result.textContent = JSON.stringify(data, null, 2);
    } catch (error) {
      result.textContent = "Erreur: " + error.message;
    }
  }

  async function testPrediction() {
    const fileInput = document.getElementById("imageInput");
    const result = document.getElementById("predictResult");

    if (!fileInput.files[0]) {
      result.textContent = "Selectionnez une image.";
      return;
    }

    result.textContent = "Prediction en cours...";
    const formData = new FormData();
    formData.append("image", fileInput.files[0]);

    try {
      const response = await fetch("/diagnosis/api/predict/", {
        method: "POST",
        body: formData,
      });
      const data = await response.json();
      result.textContent = JSON.stringify(data, null, 2);
    } catch (error) {
      result.textContent = "Erreur: " + error.message;
    }
  }
</script>
{% endblock %}
